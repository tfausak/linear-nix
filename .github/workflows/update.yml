name: Update

on:
  schedule:
    - cron: "0 12 * * 1" # every Monday at noon
  workflow_dispatch: null

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31

      - name: Check for new version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current=$(grep 'version = ' flake.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          latest=$(gh release view --repo schpet/linear-cli --json tagName -q '.tagName' | sed 's/^v//')
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update flake.nix
        if: steps.check.outputs.update == 'true'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" flake.nix

          declare -A archives=(
            ["aarch64-darwin"]="aarch64-apple-darwin"
            ["x86_64-darwin"]="x86_64-apple-darwin"
            ["aarch64-linux"]="aarch64-unknown-linux-gnu"
            ["x86_64-linux"]="x86_64-unknown-linux-gnu"
          )

          for system in "${!archives[@]}"; do
            archive="${archives[$system]}"
            url="https://github.com/schpet/linear-cli/releases/download/v${VERSION}/linear-${archive}.tar.xz"
            hash=$(nix store prefetch-file --json "$url" | jq -r '.hash')
            sed -i "/^      hashes/,/^      };/s|\"${system}\" = \".*\";|\"${system}\" = \"${hash}\";|" flake.nix
          done

      - name: Create pull request
        if: steps.check.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.latest }}
          CURRENT: ${{ steps.check.outputs.current }}
        run: |
          existing=$(gh pr list --search "in:title Update linear-cli to ${VERSION}" --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #${existing} already exists for v${VERSION}"
            exit 0
          fi

          branch="update-linear-cli-${VERSION}"
          git checkout -b "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "Update linear-cli to ${VERSION}"
          git push -u origin "$branch"
          gh pr create \
            --title "Update linear-cli to ${VERSION}" \
            --body "Automated update of linear-cli from ${CURRENT} to ${VERSION}."
